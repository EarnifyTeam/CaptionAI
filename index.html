<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToolVault Firebase</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#0b1220;
  --card:#111a2e;
  --text:#fff;
  --grad:linear-gradient(135deg,#22c55e,#06b6d4);
}
.light{
  --bg:#f3f6fb;
  --card:#fff;
  --text:#0b1220;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:var(--bg);color:var(--text);transition:.3s}

/* header */
header{display:flex;justify-content:space-between;padding:20px 40px}
.logo{font-size:24px;font-weight:700;background:var(--grad);-webkit-background-clip:text;color:transparent}
.btn{padding:10px 16px;border-radius:10px;border:none;cursor:pointer;font-weight:600}
.primary{background:var(--grad);color:#fff}

/* grid */
.container{
  max-width:1100px;margin:auto;padding:40px 20px;
  display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;
}

/* card */
.card{
  background:rgba(255,255,255,.05);
  padding:22px;border-radius:18px;transition:.3s;
}
.card:hover{transform:translateY(-8px)}
.price{float:right;background:var(--grad);padding:4px 10px;border-radius:999px;font-size:12px}
.open{display:block;margin-top:15px;background:var(--grad);padding:10px;border-radius:10px;text-align:center;color:#fff;text-decoration:none}

/* modal */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;
}
.modal-box{
  background:var(--card);padding:25px;border-radius:14px;width:300px;
}
.modal input{
  width:100%;padding:10px;margin:8px 0;border-radius:8px;border:none;
}
</style>
</head>

<body>

<header>
  <div class="logo">🚀 ToolVault</div>
  <div>
    <button class="btn" onclick="toggleTheme()">🌙</button>
    <button class="btn primary" onclick="openModal()">Login</button>
    <button class="btn" id="logoutBtn" style="display:none" onclick="logout()">Logout</button>
  </div>
</header>

<div style="text-align:center;margin-top:10px" id="userEmail"></div>

<section class="container">

  <div class="card">
    <div class="price">₹199</div>
    <h3>AI Video Downloader</h3>
    <p>Download videos instantly.</p>
    <a href="#" class="open" onclick="checkAccess(event)">Open Tool</a>
  </div>

  <div class="card">
    <div class="price">₹149</div>
    <h3>AI Caption Generator</h3>
    <p>Generate viral captions.</p>
    <a href="#" class="open" onclick="checkAccess(event)">Open Tool</a>
  </div>

</section>

<!-- LOGIN MODAL -->
<div class="modal" id="authModal">
  <div class="modal-box">
    <h3>Login / Signup</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button class="btn primary" style="width:100%" onclick="login()">Login</button>
    <button class="btn" style="width:100%;margin-top:8px" onclick="signup()">Signup</button>
  </div>
</div>

<script>
// 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "PASTE_HERE",
  authDomain: "PASTE_HERE",
  projectId: "PASTE_HERE",
  appId: "PASTE_HERE"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* theme */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* modal */
function openModal(){
  authModal.style.display="flex";
}
window.onclick=e=>{
  if(e.target.id==="authModal") authModal.style.display="none";
}

/* signup */
function signup(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(()=>alert("Signup success"))
  .catch(e=>alert(e.message));
}

/* login */
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(()=>authModal.style.display="none")
  .catch(e=>alert(e.message));
}

/* logout */
function logout(){
  auth.signOut();
}

/* auth state */
auth.onAuthStateChanged(user=>{
  if(user){
    userEmail.innerText="Logged in: "+user.email;
    logoutBtn.style.display="inline-block";
  }else{
    userEmail.innerText="";
    logoutBtn.style.display="none";
  }
});

/* tool lock */
function checkAccess(e){
  if(!auth.currentUser){
    e.preventDefault();
    openModal();
    alert("Please login first");
  }
}
</script>

</body>
</html>
