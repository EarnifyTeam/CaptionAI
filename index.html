<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HookGen AI — Video Hook Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  font-family:Inter,system-ui;
  background:#f5f5f5;
  margin:0;
  padding:30px;
  color:#111;
}

.container{
  max-width:900px;
  margin:auto;
}

.card{
  background:#fff;
  padding:24px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  margin-bottom:20px;
}

h1{
  text-align:center;
  margin-bottom:6px;
}

.sub{
  text-align:center;
  color:#666;
  margin-bottom:24px;
}

.drop{
  border:2px dashed #ccc;
  padding:40px;
  text-align:center;
  border-radius:16px;
  cursor:pointer;
}

.drop:hover{
  border-color:#059669;
  background:#f0fdf4;
}

button{
  background:#111;
  color:#fff;
  border:none;
  padding:14px 18px;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  width:100%;
}

button:hover{
  background:#333;
}

.result{
  background:#f9fafb;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
}

.tag{
  display:inline-block;
  background:#ecfdf5;
  color:#047857;
  padding:6px 12px;
  border-radius:999px;
  margin:4px;
  font-weight:600;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:12px;
}

video{
  width:100%;
  border-radius:14px;
  margin-top:10px;
}

.loading{
  text-align:center;
  font-weight:700;
  color:#059669;
}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h1>🚀 HookGen AI</h1>
<p class="sub">Upload video → AI generates viral hooks</p>

<input id="apiKey" placeholder="Paste Gemini API Key (AIza…)" />

<div class="drop" onclick="fileInput.click()">
📤 Click to upload video
<input type="file" id="fileInput" hidden accept="video/*">
</div>

<video id="video" controls style="display:none"></video>

<br>
<button onclick="analyze()">Analyze Video</button>
</div>

<div class="card">
<h3>🔥 Results</h3>
<div id="loading" class="loading" style="display:none">
Gemini is analyzing…
</div>

<div id="results"></div>
</div>

</div>

<script>
let file = null;

// upload
fileInput.onchange = e=>{
  file = e.target.files[0];
  if(!file) return;

  video.src = URL.createObjectURL(file);
  video.style.display = "block";
};

// extract thumbnail
async function extractFrame(file){
  return new Promise((resolve,reject)=>{
    const v=document.createElement("video");
    v.src=URL.createObjectURL(file);
    v.muted=true;

    v.onloadeddata=()=>{
      const c=document.createElement("canvas");
      c.width=v.videoWidth;
      c.height=v.videoHeight;
      c.getContext("2d").drawImage(v,0,0);

      const base64=c.toDataURL("image/jpeg",0.8).split(",")[1];
      resolve(base64);
    };

    v.onerror=reject;
  });
}

// main analyze
async function analyze(){
  const key=apiKey.value.trim();

  if(!key){
    alert("Add API key");
    return;
  }

  if(!file){
    alert("Upload video first");
    return;
  }

  loading.style.display="block";
  results.innerHTML="";

  try{
    const frame=await extractFrame(file);

    const resp=await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,
      {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          contents:[{
            parts:[
              {
                inline_data:{
                  mime_type:"image/jpeg",
                  data:frame
                }
              },
              {
                text:`Generate exactly 5 viral hook captions and 5 hashtags.
Return ONLY JSON:
{"titles":["t1","t2","t3","t4","t5"],"hashtags":["h1","h2","h3","h4","h5"]}`
              }
            ]
          }]
        })
      }
    );

    const data=await resp.json();
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text;

    const clean=text.replace(/```json|```/g,"").trim();
    const json=JSON.parse(clean);

    render(json);

  }catch(err){
    console.error(err);
    results.innerHTML="<p style='color:red'>❌ Error analyzing video</p>";
  }

  loading.style.display="none";
}

// render results
function render(data){
  let html="";

  html+="<h4>🎬 Hook Captions</h4>";
  data.titles.forEach(t=>{
    html+=`<div class="result">${t}</div>`;
  });

  html+="<h4>🏷 Hashtags</h4>";
  data.hashtags.forEach(h=>{
    html+=`<span class="tag">#${h.replace("#","")}</span>`;
  });

  results.innerHTML=html;
}
</script>
</body>
</html>
